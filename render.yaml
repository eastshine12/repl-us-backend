services:
  - type: web
    name: repl-us-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: REPLUS_WEB_CORS_ALLOWED_ORIGINS
        sync: false
      - key: REPLUS_WEB_BASE_URL
        sync: false
      - key: REPLUS_STORAGE_MODE
        value: object-storage
      - key: REPLUS_STORAGE_OBJECT_BUCKET
        sync: false
      - key: REPLUS_STORAGE_OBJECT_PUBLIC_BASE_URL
        sync: false
      - key: REPLUS_STORAGE_OBJECT_REGION
        sync: false
      - key: REPLUS_STORAGE_OBJECT_ENDPOINT
        sync: false
      - key: REPLUS_STORAGE_OBJECT_PATH_STYLE_ACCESS_ENABLED
        value: "false"
      - key: REPLUS_MISSION_LIFECYCLE_SCHEDULER_ENABLED
        value: "false"
