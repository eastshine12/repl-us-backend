name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  test:
    name: Gradle Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: |
          docker build \
            --pull \
            --build-arg REPLUS_BUILD_GIT_COMMIT=${{ github.sha }} \
            --build-arg REPLUS_BUILD_GIT_BRANCH=${{ github.ref_name }} \
            --build-arg REPLUS_BUILD_GIT_COMMIT_TIME=${{ github.event.head_commit.timestamp }} \
            --tag repl-us-backend:${{ github.sha }} \
            .

      - name: Smoke Docker image
        run: |
          container_name="repl-us-backend-smoke-${{ github.run_id }}-${{ github.run_attempt }}"
          docker run \
            --detach \
            --name "$container_name" \
            --publish 18080:8080 \
            --env SPRING_PROFILES_ACTIVE=local \
            --env PORT=8080 \
            repl-us-backend:${{ github.sha }}

          cleanup() {
            docker stop "$container_name" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in {1..30}; do
            if scripts/smoke-api.sh http://127.0.0.1:18080; then
              exit 0
            fi
            echo "Docker smoke attempt $attempt failed; retrying..."
            sleep 2
          done

          echo "Docker smoke did not become ready" >&2
          docker logs "$container_name" >&2 || true
          exit 1
