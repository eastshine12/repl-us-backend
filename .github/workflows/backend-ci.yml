name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"

permissions:
  contents: read

jobs:
  test:
    name: Gradle Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --pull --tag repl-us-backend:${{ github.sha }} .
