spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  h2:
    console:
      enabled: false

replus:
  auth:
    session-store: ${REPLUS_AUTH_SESSION_STORE:database}
    dev-fixed-tokens-enabled: false
    guest-session-enabled: ${REPLUS_AUTH_GUEST_SESSION_ENABLED:false}
    social:
      google:
        client-ids: ${REPLUS_AUTH_SOCIAL_GOOGLE_CLIENT_IDS:}
      apple:
        client-ids: ${REPLUS_AUTH_SOCIAL_APPLE_CLIENT_IDS:}
  web-base-url: ${REPLUS_WEB_BASE_URL:}
  web:
    cors:
      allowed-origins: ${REPLUS_WEB_CORS_ALLOWED_ORIGINS:}
  seed-dev-data: false
  mission:
    lifecycle:
      scheduler:
        enabled: ${REPLUS_MISSION_LIFECYCLE_SCHEDULER_ENABLED:false}
  storage:
    object-storage:
      public-base-url: ${REPLUS_STORAGE_OBJECT_PUBLIC_BASE_URL:}
