server:
  port: ${PORT:8080}

spring:
  application:
    name: repl-us-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:replus;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

replus:
  web-base-url: ${REPLUS_WEB_BASE_URL:http://localhost:3000}
  web:
    cors:
      allowed-origins: ${REPLUS_WEB_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  seed-dev-data: ${REPLUS_SEED_DEV_DATA:true}
  mission:
    lifecycle:
      zone: ${REPLUS_MISSION_LIFECYCLE_ZONE:Asia/Seoul}
      scheduler:
        enabled: ${REPLUS_MISSION_LIFECYCLE_SCHEDULER_ENABLED:false}
        fail-incomplete-cron: ${REPLUS_MISSION_LIFECYCLE_FAIL_INCOMPLETE_CRON:0 5 0 * * *}
        release-due-fixed-delay: ${REPLUS_MISSION_LIFECYCLE_RELEASE_DUE_FIXED_DELAY:30000}
        release-due-initial-delay: ${REPLUS_MISSION_LIFECYCLE_RELEASE_DUE_INITIAL_DELAY:30000}
  storage:
    mode: ${REPLUS_STORAGE_MODE:local}
    local:
      upload-base-url: ${REPLUS_STORAGE_LOCAL_UPLOAD_BASE_URL:http://localhost:8080/mock-upload}
      playback-base-url: ${REPLUS_STORAGE_LOCAL_PLAYBACK_BASE_URL:http://localhost:8080/mock-playback}
    object-storage:
      bucket: ${REPLUS_STORAGE_OBJECT_BUCKET:}
      public-base-url: ${REPLUS_STORAGE_OBJECT_PUBLIC_BASE_URL:http://localhost:8080/mock-playback}
      region: ${REPLUS_STORAGE_OBJECT_REGION:auto}
      endpoint: ${REPLUS_STORAGE_OBJECT_ENDPOINT:}
      path-style-access-enabled: ${REPLUS_STORAGE_OBJECT_PATH_STYLE_ACCESS_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,db,storage
        liveness:
          include: livenessState
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    com.replus.api: INFO
