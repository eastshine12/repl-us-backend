server:
  port: ${PORT:8080}

spring:
  application:
    name: repl-us-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:replus;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

replus:
  web-base-url: ${REPLUS_WEB_BASE_URL:http://localhost:3000}
  seed-dev-data: ${REPLUS_SEED_DEV_DATA:true}
  storage:
    mode: ${REPLUS_STORAGE_MODE:local}
    local:
      upload-base-url: ${REPLUS_STORAGE_LOCAL_UPLOAD_BASE_URL:http://localhost:8080/mock-upload}
      playback-base-url: ${REPLUS_STORAGE_LOCAL_PLAYBACK_BASE_URL:http://localhost:8080/mock-playback}
    object-storage:
      bucket: ${REPLUS_STORAGE_OBJECT_BUCKET:}
      public-base-url: ${REPLUS_STORAGE_OBJECT_PUBLIC_BASE_URL:http://localhost:8080/mock-playback}

logging:
  level:
    com.replus.api: INFO
